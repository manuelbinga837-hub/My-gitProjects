<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brain Code 44</title>

    <link rel="stylesheet" href="novoQuiz.css">

</head>

<body>

<header>

    <h1>🧠 Brain Code 44</h1>

    <p>Teste seus conhecimentos em programação</p>

</header>


<main class="quiz-container">

    <div class="card">


        <div class="progresso" id="progresso">

            Pergunta 1 de 10

        </div>


        <h2 id="pergunta">

            <!-- A pergunta aparece pelo JavaScript -->

        </h2>


        <div id="opcoes">

            <!-- Botões das respostas aparecem pelo JavaScript -->

        </div>


        <p id="mensagem">

        </p>


        <button id="proxima">

            Próxima pergunta

        </button>


        <!-- Pontuação durante o jogo -->

        <div class="pontuacao">

            Pontuação:
            <span id="pontos">0</span>

        </div>


        <!-- Resultado final -->

        <div class="resultado" id="resultado">


        </div>


    </div>

</main>


<script src="novoQuiz.js"></script>

</body>

  </html>
